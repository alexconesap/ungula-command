name=UngulaCommand
version=0.2.0
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=Portable application command primitives: envelope and gated ingress skeleton.
paragraph=Embedded C++ command layer for projects that ingest actions from UI, REST, peer-node, cloud, or MQTT. Provides a project-agnostic command vocabulary (source/domain/result enums), a fixed-size CommandEnvelope with inline payload storage, and a CommandIngress skeleton (correlation-id counter, run-state gate, domain fan-out, one-shot operator notice). No heap allocation and no transport coupling. Supported targets: portable across Arduino-compatible MCUs.
category=Communication
url=https://github.com/alexconesap/ungula-command.git
includes=ungula_command.h
depends=UngulaCore
architectures=*

